name: Frontend CI

on:
  pull_request:
    paths:
      - "src/**"
      - "eslint.config.js"
      - "package.json"
      - "tsconfig*.json"
      - "vite.config.ts"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches: [main, dev]
    paths:
      - "src/**"
      - "eslint.config.js"
      - "package.json"
      - "tsconfig*.json"
      - "vite.config.ts"
      - ".github/workflows/frontend-ci.yml"

jobs:
  lint-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run accessibility lint in CI
        run: npm run lint:a11y:ci

      - name: Run ESLint in CI
        run: npm run lint:ci

      - name: Build app
        run: npm run build
